{% extends "base.html" %}

{% block title %}{{ code }} - {{ spanish_title }}{% endblock %}

{% block extra_head %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap');

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    /* Soft animated background blobs */
    .bg-blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.35;
        pointer-events: none;
        z-index: 0;
        animation: drift 10s ease-in-out infinite alternate;
    }

    .bg-blob-1 {
        width: 420px;
        height: 420px;
        background: #c7d8f8;
        top: -100px;
        left: -120px;
        animation-delay: 0s;
    }

    .bg-blob-2 {
        width: 360px;
        height: 360px;
        background: #b5e4d3;
        bottom: -80px;
        right: -100px;
        animation-delay: -5s;
    }

    .bg-blob-3 {
        width: 220px;
        height: 220px;
        background: #fde8c8;
        top: 40%;
        left: 55%;
        animation-delay: -2.5s;
    }

    @keyframes drift {
        0% {
            transform: translate(0, 0) scale(1);
        }

        100% {
            transform: translate(30px, 20px) scale(1.08);
        }
    }

    /* Main card */
    .error-card {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 28px;
        box-shadow:
            0 8px 40px rgba(20, 40, 80, 0.10),
            0 1px 0 rgba(255, 255, 255, 0.8) inset;
        padding: 56px 52px 48px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        animation: slideUp 0.55s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(28px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Big error number */
    .error-number {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: clamp(88px, 20vw, 120px);
        line-height: 1;
        letter-spacing: -4px;
        color: transparent;
        background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
        -webkit-background-clip: text;
        background-clip: text;
        margin-bottom: 0;
        animation: numberPop 0.7s cubic-bezier(.34, 1.56, .64, 1) 0.15s both;
    }

    @keyframes numberPop {
        from {
            opacity: 0;
            transform: scale(0.7);
        }

        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    .error-divider {
        width: 56px;
        height: 3px;
        background: linear-gradient(90deg, #3b82f6, #10b981);
        border-radius: 99px;
        margin: 18px auto 22px;
        animation: expandLine 0.5s ease 0.4s both;
    }

    @keyframes expandLine {
        from {
            width: 0;
            opacity: 0;
        }

        to {
            width: 56px;
            opacity: 1;
        }
    }

    .title {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: 1.6rem;
        color: #1e293b;
        margin-bottom: 10px;
        letter-spacing: -0.3px;
    }

    .description {
        font-family: 'DM Sans', system-ui, sans-serif;
        color: #64748b;
        font-size: 0.97rem;
        line-height: 1.65;
        margin-bottom: 36px;
    }

    .btn-home {
        font-family: 'DM Sans', system-ui, sans-serif;
        font-weight: 600;
        font-size: 0.93rem;
        padding: 12px 28px;
        border-radius: 12px;
        background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
        color: #fff;
        border: none;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        box-shadow: 0 4px 18px rgba(59, 130, 246, 0.28);
    }

    .btn-home:hover {
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(59, 130, 246, 0.38);
        opacity: 0.95;
    }

    .btn-home:active {
        transform: translateY(0);
    }

    .brand-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 32px;
        text-decoration: none;
        padding: 6px 14px 6px 8px;
        border-radius: 99px;
        background: rgba(59, 130, 246, 0.07);
        border: 1px solid rgba(59, 130, 246, 0.12);
        transition: background 0.18s;
    }

    .brand-badge:hover {
        background: rgba(59, 130, 246, 0.12);
    }

    .brand-badge-icon {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        object-fit: contain;
    }

    .brand-badge-text {
        font-family: 'DM Sans', system-ui, sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        color: #3b82f6;
    }

    /* Floating decorative dots */
    .dot {
        position: fixed;
        border-radius: 50%;
        z-index: 0;
        opacity: 0.18;
        pointer-events: none;
    }

    .dot-1 {
        width: 10px;
        height: 10px;
        background: #3b82f6;
        top: 20%;
        left: 12%;
        animation: floatDot 6s ease-in-out infinite;
    }

    .dot-2 {
        width: 6px;
        height: 6px;
        background: #10b981;
        top: 70%;
        left: 8%;
        animation: floatDot 8s ease-in-out infinite reverse;
    }

    .dot-3 {
        width: 8px;
        height: 8px;
        background: #f59e0b;
        top: 30%;
        right: 10%;
        animation: floatDot 7s ease-in-out infinite 1s;
    }

    .dot-4 {
        width: 12px;
        height: 12px;
        background: #10b981;
        bottom: 25%;
        right: 14%;
        animation: floatDot 9s ease-in-out infinite 0.5s reverse;
    }

    @keyframes floatDot {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-14px);
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>
<div class="dot dot-1"></div>
<div class="dot dot-2"></div>
<div class="dot dot-3"></div>
<div class="dot dot-4"></div>

<div class="error-card">
    <a href="{{ url_for('main.index') }}" class="brand-badge">
        <img src="{{ url_for('static', filename='img/icon.svg') }}" alt="NanoLink" class="brand-badge-icon">
        <span class="brand-badge-text">NanoLink</span>
    </a>

    <div class="error-number">{{ code }}</div>
    <div class="error-divider"></div>

    <h1 class="title">{{ spanish_title }}</h1>
    <p class="description">{{ description }}</p>

    <a href="{{ url_for('main.index') }}" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6" />
        </svg>
        Volver al inicio
    </a>
</div>
{% endblock %}
