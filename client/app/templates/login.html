{% extends "base.html" %}

{% block title %}Iniciar sesión — NanoLink{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">

        <a href="{{ url_for('main.index') }}" class="auth-brand">
            <img src="{{ url_for('static', filename='img/icon.svg') }}" alt="NanoLink" class="auth-brand-icon">
            <span class="auth-brand-name">NanoLink</span>
        </a>

        <div class="auth-divider"></div>

        <h1 class="auth-title">Bienvenido de nuevo</h1>
        <p class="auth-subtitle">Inicia sesión para gestionar tus enlaces.</p>

        <form method="POST">
            {% if error %}
            <div class="form-error">
                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"
                    style="flex-shrink:0">
                    <circle cx="12" cy="12" r="10" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01" />
                </svg>
                {{ error }}
            </div>
            {% endif %}
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" placeholder="tu_usuario" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-full" style="margin-top: 4px;">
                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
                Iniciar sesión
            </button>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate aquí</a>
        </div>

    </div>
</div>
{% endblock %}
